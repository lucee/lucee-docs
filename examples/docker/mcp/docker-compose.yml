services:
  lucee:
    build: .
    image: lucee-mcp:latest
    environment:
      - LUCEE_ADMIN_PASSWORD=qwerty
      - LUCEE_DOC_RECIPES_PATH=https://raw.githubusercontent.com/lucee/lucee-docs/refs/heads/master
    ports:
      - "8856:8888"  # tomcat
      - "8056:80"    # nginx

# how to run it
# docker compose up -d --build
