services:
  lucee:
    build: .
    image: lucee-s3-localstack:latest
    environment:
      - LUCEE_ADMIN_PASSWORD=qwerty
      # Point Lucee's S3 extension at LocalStack
      - LUCEE_S3_ACCESSKEYID=test
      - LUCEE_S3_SECRETACCESSKEY=test
      - LUCEE_S3_HOST=localstack:4566
      - LUCEE_S3_REGION=us-east-1
    volumes:
      - "./www:/var/www"
    ports:
      - "8854:8888"  # tomcat
      - "8054:80"    # nginx
    depends_on:
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully

  localstack:
    image: localstack/localstack:3.8.1  # last free community version before LocalStack moved core services behind a paywall
    ports:
      - "4566:4566"   # AWS API endpoint
    environment:
      - SERVICES=s3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot container that seeds LocalStack with buckets and example objects
  localstack-init:
    image: amazon/aws-cli:latest
    depends_on:
      localstack:
        condition: service_healthy
    volumes:
      - "./localstack-init:/init"
    entrypoint: ["/bin/sh", "/init/init.sh"]

# how to run it
# docker compose up -d